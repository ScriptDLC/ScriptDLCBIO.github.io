<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio | ScriptDLC</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff4da6;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 77, 166, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1500px;
        }

        .bg-glow {
            position: fixed;
            width: 600px; height: 600px;
            background: var(--pink);
            filter: blur(160px);
            opacity: 0.1;
            z-index: -1;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Кнопка включения */
        #play-btn {
            position: fixed; z-index: 999;
            width: 100px; height: 100px;
            background: #fff; border: 4px solid var(--pink);
            border-radius: 50%; display: flex;
            justify-content: center; align-items: center;
            cursor: pointer;
            box-shadow: 0 0 25px var(--pink);
            transition: all 0.4s ease;
            animation: pulse 2s infinite;
        }
        #play-btn svg { fill: var(--pink); width: 40px; height: 40px; margin-left: 5px; }
        #play-btn.hidden { opacity: 0; visibility: hidden; transform: scale(0.5); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 166, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 77, 166, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 166, 0); }
        }

        .tilt-container {
            width: 95%;
            max-width: 1150px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 25px;
            z-index: 1;
            transform-style: preserve-3d;
            filter: blur(15px);
            pointer-events: none;
            transition: filter 1.2s ease;
            will-change: transform;
        }

        .tilt-container.active { filter: blur(0); pointer-events: all; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            transform: translateZ(20px);
        }

        h1 { font-size: 2.5rem; margin-bottom: 20px; color: var(--pink); text-shadow: 0 0 20px rgba(255,77,166,0.4); }
        h2 { font-size: 1rem; margin-bottom: 25px; color: #fff; text-transform: uppercase; letter-spacing: 3px; opacity: 0.8; }

        .main-content { display: flex; flex-direction: column; gap: 25px; transform-style: preserve-3d; }

        /* Список в био с розовыми точками */
        .bio-list { list-style: none; margin-bottom: 15px; }
        .bio-list li { 
            display: flex; 
            align-items: center; 
            margin-bottom: 12px; 
            font-size: 1.1rem;
            color: #ddd;
        }
        .dot { 
            width: 10px; height: 10px; 
            background-color: var(--pink); 
            border-radius: 50%; 
            margin-right: 15px; 
            box-shadow: 0 0 10px var(--pink);
            flex-shrink: 0;
        }

        .video-container { 
            position: relative; border-radius: 20px; overflow: hidden; 
            background: #000; aspect-ratio: 16/9;
            transform: translateZ(50px);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Карточки персонажей */
        .char-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 15px;
            transition: border-color 0.4s;
            transform: translateZ(30px);
        }
        .char-card:hover { border-color: var(--pink); }
        .img-wrapper { width: 100%; height: 140px; background: #151515; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .char-name { padding: 10px; text-align: center; color: var(--pink); font-weight: 600; font-size: 0.8rem; }

        @media (max-width: 900px) {
            .tilt-container { grid-template-columns: 1fr; transform: none !important; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: -10%; left: -10%;"></div>
    <div class="bg-glow" style="bottom: -10%; right: 10%;"></div>

    <div id="play-btn">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>

    <div class="tilt-container" id="tilt">
        <div class="main-content">
            <div class="glass-panel">
                <h1>ScriptDLC ❤</h1>
                <ul class="bio-list">
                    <li><span class="dot"></span>Маленький контент креатор</li>
                    <li><span class="dot"></span>Знаю Luau и HTML</li>
                    <li><span class="dot"></span>Разработчик</li>
                </ul>
                <p style="opacity:0.7; line-height: 1.5;">Специализируюсь на создании уникальных скриптов. Добро пожаловать в мой профиль!</p>
            </div>

            <div class="glass-panel">
                <div class="video-container">
                    <video id="v" loop playsinline>
                        <source src="assets/video.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="glass-panel">
                <h2>Любимые персы</h2>
                
                <div class="char-card">
                    <div class="img-wrapper">
                        <img src="assets/photo1.png" onerror="this.src='assets/photo1.jpg'; this.onerror=function(){this.src='assets/photo1.webp'}">
                    </div>
                    <div class="char-name">Мейсшо Дото</div>
                </div>

                <div class="char-card">
                    <div class="img-wrapper">
                        <img src="assets/photo2.png" onerror="this.src='assets/photo2.jpg'; this.onerror=function(){this.src='assets/photo2.webp'}">
                    </div>
                    <div class="char-name">Коната Изуми</div>
                </div>

                <div class="char-card">
                    <div class="img-wrapper">
                        <img src="assets/photo3.png" onerror="this.src='assets/photo3.jpg'; this.onerror=function(){this.src='assets/photo3.webp'}">
                    </div>
                    <div class="char-name">Юи Харисава</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const tilt = document.getElementById('tilt');
        const v = document.getElementById('v');
        const playBtn = document.getElementById('play-btn');

        let mouseX = 0, mouseY = 0;
        let currentX = 0, currentY = 0;
        const smoothness = 0.08; 

        playBtn.onclick = () => {
            playBtn.classList.add('hidden');
            tilt.classList.add('active');
            v.volume = 0.3;
            v.play();
        };

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = (e.clientY / window.innerHeight) * 2 - 1;
        });

        function animate() {
            if (tilt.classList.contains('active') && window.innerWidth > 900) {
                const targetX = mouseY * -12; 
                const targetY = mouseX * 12;

                currentX += (targetX - currentX) * smoothness;
                currentY += (targetY - currentY) * smoothness;

                tilt.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;
            }
            requestAnimationFrame(animate);
        }

        animate();

        document.addEventListener('mouseleave', () => {
            mouseX = 0; mouseY = 0;
        });
    </script>
</body>
</html>
